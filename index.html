<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#171225" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mounjaro" />
  <title>Mounjaro Rechner</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div><p class="eyebrow">Mounjaro</p><h1>Pen Rechner</h1></div>
      <button id="themeBtn" class="icon-btn" aria-label="Design wechseln">☾</button>
    </header>

    <section id="dashboard" class="view active">
      <article class="hero-card glass">
        <div class="hero-grid">
          <div>
            <p class="muted">Aktiver Pen</p>
            <h2 id="activePenTitle">Kein Pen</h2>
            <p id="activePenSubtitle" class="muted">Starte einen neuen Pen.</p>
          </div>
          <div class="ring" aria-label="Restmenge">
            <svg viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
              <circle id="ringProgress" class="ring-progress" cx="60" cy="60" r="50"></circle>
            </svg>
            <div><strong id="restValue">0</strong><span>mg Rest</span></div>
          </div>
        </div>
        <div class="pen-visual"><div id="penFill" class="pen-fill"></div><div class="pen-cap"></div></div>
        <div class="hero-actions">
          <button class="primary" id="openDoseBtn">+ Wirkstoff entnehmen</button>
          <button class="secondary" id="newPenBtn">Neuer Pen</button>
        </div>
      </article>

      <section class="stats-row">
        <article class="mini-card"><span>Verbraucht</span><strong id="usedValue">0 mg</strong></article>
        <article class="mini-card"><span>Letzte Entnahme</span><strong id="lastDoseValue">–</strong></article>
      </section>

      <article class="glass planner-card">
        <div class="section-title"><h3>Pen-Planer</h3><span>Flexible Nutzung</span></div>
        <div class="form-grid small">
          <label>Wunschdosis mg<input id="plannerDose" type="number" step="0.01" inputmode="decimal" placeholder="z. B. 2,5"></label>
        </div>
        <p id="plannerResult" class="planner-result">Gib eine Wunschdosis ein.</p>
      </article>
    </section>

    <section id="pens" class="view">
      <div class="section-title"><h2>Pens</h2><button class="small-btn" id="newPenBtn2">+ Neu</button></div>
      <div id="penList" class="list"></div>
    </section>

    <section id="history" class="view">
      <div class="section-title"><h2>Verlauf</h2><button class="small-btn danger" id="clearHistoryBtn">Leeren</button></div>
      <div id="historyList" class="list"></div>
    </section>

    <section id="settings" class="view">
      <article class="glass settings-card">
        <h2>Einstellungen</h2>
        <button class="secondary full" id="exportBtn">Daten exportieren</button>
        <label class="secondary full file-label">Daten importieren<input id="importInput" type="file" accept="application/json"></label>
        <button class="secondary danger full" id="resetAllBtn">Alle Daten löschen</button>
        <p class="muted tiny">Alle Daten bleiben lokal im Browser auf deinem Gerät gespeichert.</p>
      </article>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="dashboard">⌂<span>Start</span></button>
    <button class="tab" data-view="pens">▣<span>Pens</span></button>
    <button class="tab" data-view="history">↺<span>Verlauf</span></button>
    <button class="tab" data-view="settings">⚙<span>Mehr</span></button>
  </nav>

  <dialog id="penDialog" class="modal">
    <form method="dialog" id="penForm">
      <h2>Neuer Pen</h2>
      <label>Pen-Stärke
        <select id="penStrength"><option>2.5</option><option>5</option><option>7.5</option><option>10</option><option>12.5</option><option>15</option></select>
      </label>
      <label>Name optional<input id="penName" placeholder="z. B. Pen 10 mg"></label>
      <div class="modal-actions"><button class="secondary" value="cancel">Abbrechen</button><button class="primary" id="savePenBtn" value="default">Speichern</button></div>
    </form>
  </dialog>

  <dialog id="doseDialog" class="modal">
    <form method="dialog" id="doseForm">
      <h2>Wirkstoff entnehmen</h2>
      <label>Menge in mg<input id="doseAmount" type="number" step="0.01" inputmode="decimal" required placeholder="z. B. 2,5"></label>
      <label>Notiz optional<input id="doseNote" placeholder="z. B. Woche 3"></label>
      <div class="modal-actions"><button class="secondary" value="cancel">Abbrechen</button><button class="primary" id="saveDoseBtn" value="default">Speichern</button></div>
    </form>
  </dialog>

  <script src="js/app.js"></script>
</body>
</html>
