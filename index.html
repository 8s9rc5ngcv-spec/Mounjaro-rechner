<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mounjaro Rechner</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6d5dfc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mounjaro" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mounjaro</p>
        <h1>Pen Rechner</h1>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Einstellungen">⚙️</button>
    </header>

    <main>
      <section class="hero-card glass">
        <div class="hero-row">
          <div>
            <p class="label">Aktueller Pen</p>
            <h2 id="activePenTitle">Noch kein Pen</h2>
            <p class="muted" id="activePenSub">Starte einen neuen Pen.</p>
          </div>
          <div class="ring" id="ring"><span id="ringText">0%</span></div>
        </div>
        <div class="meter"><div id="meterFill"></div></div>
        <div class="stats-grid">
          <div><span id="remainingMg">0</span><small>mg Rest</small></div>
          <div><span id="usedMg">0</span><small>mg genutzt</small></div>
          <div><span id="lastDose">–</span><small>letzte Entnahme</small></div>
        </div>
      </section>

      <section class="actions">
        <button class="primary" id="newPenBtn">💉 Neuer Pen</button>
        <button class="secondary" id="doseBtn">➕ Entnahme</button>
      </section>

      <section class="card">
        <div class="section-head"><h3>Pen-Planer</h3><span id="plannerResult">–</span></div>
        <div class="form-grid">
          <label>Pen-Stärke
            <select id="plannerStrength"></select>
          </label>
          <label>Wunschdosis mg
            <input id="plannerDose" type="number" min="0" step="0.01" placeholder="z. B. 5" />
          </label>
        </div>
      </section>

      <section class="card">
        <div class="section-head"><h3>Verlauf</h3><button class="text-btn" id="clearHistoryBtn">löschen</button></div>
        <div id="historyList" class="history"></div>
      </section>
    </main>
  </div>

  <dialog id="penDialog">
    <form method="dialog" class="dialog-card">
      <h3>Neuen Pen starten</h3>
      <label>Pen-Stärke
        <select id="penStrength"></select>
      </label>
      <label>Individuelle Gesamtmenge mg
        <input id="customTotal" type="number" min="0" step="0.01" placeholder="optional" />
      </label>
      <menu><button value="cancel">Abbrechen</button><button id="savePen" value="default">Speichern</button></menu>
    </form>
  </dialog>

  <dialog id="doseDialog">
    <form method="dialog" class="dialog-card">
      <h3>Wirkstoff entnehmen</h3>
      <label>Menge mg
        <input id="doseAmount" type="number" min="0" step="0.01" placeholder="z. B. 5" />
      </label>
      <label>Notiz
        <input id="doseNote" type="text" placeholder="optional" />
      </label>
      <menu><button value="cancel">Abbrechen</button><button id="saveDose" value="default">Speichern</button></menu>
    </form>
  </dialog>

  <dialog id="settingsDialog">
    <form method="dialog" class="dialog-card">
      <h3>Einstellungen</h3>
      <button id="exportBtn" class="secondary" type="button">Daten exportieren</button>
      <label class="file-label">Daten importieren
        <input id="importFile" type="file" accept="application/json" />
      </label>
      <menu><button value="cancel">Schließen</button></menu>
    </form>
  </dialog>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
